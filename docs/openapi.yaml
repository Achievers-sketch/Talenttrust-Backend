openapi: 3.0.3
info:
  title: TalentTrust Backend API
  description: API for managing escrow contract metadata.
  version: 0.1.0
servers:
  - url: http://localhost:3001/api/v1
    description: Local development server
paths:
  /contracts/{contractId}/metadata:
    parameters:
      - name: contractId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Create metadata
      description: Creates a new metadata record for a contract.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContractMetadata'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractMetadata'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '409':
          description: Conflict
    get:
      summary: List metadata
      description: Retrieves paginated metadata records for a contract.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: key
          in: query
          schema:
            type: string
        - name: data_type
          in: query
          schema:
            type: string
            enum: [string, number, boolean, json]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContractMetadata'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
        '401':
          description: Unauthorized

  /contracts/{contractId}/metadata/{id}:
    parameters:
      - name: contractId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get single metadata
      description: Retrieves a specific metadata record by ID.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractMetadata'
        '400':
          description: Not Found
        '401':
          description: Unauthorized
    patch:
      summary: Update metadata
      description: Updates an existing metadata record.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContractMetadata'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractMetadata'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
    delete:
      summary: Delete metadata
      description: Soft deletes a metadata record.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    ContractMetadata:
      type: object
      properties:
        id:
          type: string
          format: uuid
        contract_id:
          type: string
          format: uuid
        key:
          type: string
        value:
          type: string
        data_type:
          type: string
          enum: [string, number, boolean, json]
        is_sensitive:
          type: boolean
        created_by:
          type: string
          format: uuid
        updated_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateContractMetadata:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 255
        value:
          type: string
          minLength: 1
          maxLength: 10000
        data_type:
          type: string
          enum: [string, number, boolean, json]
          default: string
        is_sensitive:
          type: boolean
          default: false

    UpdateContractMetadata:
      type: object
      properties:
        value:
          type: string
          minLength: 1
          maxLength: 10000
        is_sensitive:
          type: boolean
